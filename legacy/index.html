    <!-- Custom Styles -->
    <style>
        /* ============================================
           Custom CSS Styles
           ============================================ */
        
        /* Base Styles */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Scrollbar Styles */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }
        
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #64748B;
        }
        
        /* Hide scrollbar but keep functionality */
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        
        /* Custom scrollbar for lyrics */
        .lyrics-scroll::-webkit-scrollbar {
            width: 6px;
        }
        
        .lyrics-scroll::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 3px;
        }
        
        .lyrics-scroll::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 3px;
        }
        
        /* Focus Styles */
        .focus-ring:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }
        
        .focus-ring:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.5);
        }
        
        /* Skip to Content Link */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            padding: 8px 16px;
            background: #6366F1;
            color: white;
            text-decoration: none;
            z-index: 1000;
            transition: top 0.3s;
        }
        
        .skip-link:focus {
            top: 0;
        }
        
        /* Selection Styles */
        ::selection {
            background: rgba(99, 102, 241, 0.3);
            color: inherit;
        }
        
        /* Placeholder Styles */
        ::placeholder {
            color: #9CA3AF;
            opacity: 1;
        }
        
        .dark ::placeholder {
            color: #6B7280;
        }
        
        /* Lyrics Font */
        .font-lyrics {
            font-family: Georgia, Cambria, serif;
            line-height: 1.8;
        }
        
        /* Line Numbers for Lyrics */
        .lyrics-line-numbers {
            counter-reset: line;
        }
        
        .lyrics-line-numbers .lyrics-line::before {
            counter-increment: line;
            content: counter(line);
            display: inline-block;
            width: 2rem;
            margin-right: 1rem;
            text-align: right;
            color: #9CA3AF;
            font-size: 0.75rem;
            user-select: none;
        }
        
        /* Skeleton Loading Animation */
        .skeleton {
            background: linear-gradient(
                90deg,
                rgba(0, 0, 0, 0.06) 25%,
                rgba(0, 0, 0, 0.1) 50%,
                rgba(0, 0, 0, 0.06) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
        }
        
        .dark .skeleton {
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.06) 25%,
                rgba(255, 255, 255, 0.1) 50%,
                rgba(255, 255, 255, 0.06) 75%
            );
            background-size: 200% 100%;
        }
        
        /* Toast Animations */
        .toast-enter {
            animation: slideUp 0.3s ease-out forwards;
        }
        
        .toast-exit {
            animation: fadeOut 0.2s ease-in forwards;
        }
        
        /* Modal Backdrop */
        .modal-backdrop {
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        
        /* Card Hover Effects */
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
        }
        
        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #6366F1 0%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Gradient Background */
        .gradient-bg {
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #EC4899 100%);
        }
        
        /* Glass Effect */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .dark .glass {
            background: rgba(31, 41, 55, 0.7);
        }
        
        /* Ripple Effect */
        .ripple {
            position: relative;
            overflow: hidden;
        }
        
        .ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }
        
        .ripple:active::after {
            width: 200%;
            height: 200%;
        }
        
        /* Sidebar Transition */
        .sidebar-transition {
            transition: width 0.3s ease, transform 0.3s ease;
        }
        
        /* Page Transitions */
        .page-enter {
            animation: fadeIn 0.3s ease-out;
        }
        
        .page-exit {
            animation: fadeOut 0.2s ease-in;
        }
        
        /* Swipe Actions */
        .swipe-item {
            touch-action: pan-y;
        }
        
        /* Auto-scroll Animation */
        @keyframes autoScroll {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(var(--scroll-distance));
            }
        }
        
        .auto-scrolling {
            animation: autoScroll var(--scroll-duration) linear infinite;
        }
        
        /* Presentation Mode */
        .presentation-mode {
            font-size: 2rem;
            line-height: 2;
        }
        
        .presentation-mode .lyrics-line {
            padding: 0.5rem 0;
            transition: opacity 0.3s ease;
        }
        
        .presentation-mode .lyrics-line.active {
            opacity: 1;
            font-weight: 600;
        }
        
        .presentation-mode .lyrics-line.inactive {
            opacity: 0.4;
        }
        
        /* Print Styles */
        @media print {
            body {
                background: white !important;
                color: black !important;
            }
            
            .no-print {
                display: none !important;
            }
            
            .print-only {
                display: block !important;
            }
            
            .lyrics-container {
                font-family: Georgia, serif;
                font-size: 12pt;
                line-height: 1.8;
            }
        }
        
        /* High Contrast Mode */
        .high-contrast {
            --tw-text-opacity: 1;
            filter: contrast(1.2);
        }
        
        .high-contrast .bg-dark-800 {
            background-color: #000 !important;
        }
        
        .high-contrast .text-dark-400 {
            color: #fff !important;
        }
        
        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        .reduce-motion *,
        .reduce-motion *::before,
        .reduce-motion *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
        }
        
        /* Touch Device Optimizations */
        @media (hover: none) and (pointer: coarse) {
            .card-hover:hover {
                transform: none;
            }
            
            .hover\:scale-105:hover {
                transform: none;
            }
        }
        
        /* Mobile Bottom Navigation */
        .bottom-nav {
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* iOS Safe Areas */
        @supports (padding: max(0px)) {
            .safe-top {
                padding-top: max(1rem, env(safe-area-inset-top));
            }
            
            .safe-bottom {
                padding-bottom: max(1rem, env(safe-area-inset-bottom));
            }
            
            .safe-left {
                padding-left: max(1rem, env(safe-area-inset-left));
            }
            
            .safe-right {
                padding-right: max(1rem, env(safe-area-inset-right));
            }
        }
        
        /* Tag Input Styles */
        .tag-input {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.5rem;
            min-height: 2.75rem;
        }
        
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            background: rgba(99, 102, 241, 0.1);
            color: #6366F1;
            border-radius: 9999px;
            font-size: 0.875rem;
        }
        
        .dark .tag {
            background: rgba(99, 102, 241, 0.2);
            color: #A5B4FC;
        }
        
        /* Dropdown Animation */
        .dropdown-enter {
            animation: scaleIn 0.15s ease-out;
            transform-origin: top;
        }
        
        .dropdown-exit {
            animation: scaleOut 0.1s ease-in;
            transform-origin: top;
        }
        
        /* Tooltip */
        .tooltip {
            position: relative;
        }
        
        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.5rem 0.75rem;
            background: #1F2937;
            color: white;
            font-size: 0.75rem;
            border-radius: 0.375rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
            z-index: 50;
        }
        
        .tooltip:hover::after {
            opacity: 1;
            visibility: visible;
        }
        
        /* Empty State Illustration */
        .empty-illustration {
            max-width: 200px;
            opacity: 0.8;
        }
        
        /* Progress Bar */
        .progress-bar {
            height: 4px;
            background: #E5E7EB;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366F1, #EC4899);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        
        /* Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: #E5E7EB;
            border-radius: 3px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #6366F1;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        
        .dark input[type="range"] {
            background: #374151;
        }
        
        /* Checkbox Custom */
        .checkbox-custom {
            position: relative;
            width: 1.25rem;
            height: 1.25rem;
        }
        
        .checkbox-custom input {
            opacity: 0;
            position: absolute;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .checkbox-custom .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            border: 2px solid #D1D5DB;
            border-radius: 0.25rem;
            transition: all 0.2s;
        }
        
        .checkbox-custom input:checked + .checkmark {
            background: #6366F1;
            border-color: #6366F1;
        }
        
        .checkbox-custom .checkmark::after {
            content: '';
            position: absolute;
            display: none;
            left: 6px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        
        .checkbox-custom input:checked + .checkmark::after {
            display: block;
        }
        
        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            width: 3rem;
            height: 1.5rem;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #D1D5DB;
            transition: 0.3s;
            border-radius: 9999px;
        }
        
        .toggle-slider::before {
            position: absolute;
            content: '';
            height: 1.25rem;
            width: 1.25rem;
            left: 2px;
            bottom: 2px;
            background: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        
        .toggle-switch input:checked + .toggle-slider {
            background: #6366F1;
        }
        
        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(1.5rem);
        }
        
        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366F1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        /* Dots Loading */
        .dots-loading span {
            animation: bounceSoft 1s ease-in-out infinite;
        }
        
        .dots-loading span:nth-child(2) {
            animation-delay: 0.1s;
        }
        
        .dots-loading span:nth-child(3) {
            animation-delay: 0.2s;
        }
    </style>
    
    <title>LyricVault - Track, Create & Share Your Lyrics</title>
</head>

    <script>
    // ============================================
    // UTILITIES MODULE
    // ============================================
    const Utils = {
        /**
         * Generate a UUID v4
         * @returns {string} UUID string
         */
        generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        },

        /**
         * Format a date to a readable string
         * @param {Date|string|number} date - Date to format
         * @param {object} options - Intl.DateTimeFormat options
         * @returns {string} Formatted date string
         */
        formatDate(date, options = {}) {
            const defaultOptions = {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                ...options
            };
            return new Intl.DateTimeFormat('en-US', defaultOptions).format(new Date(date));
        },

        /**
         * Format a date to relative time (e.g., "2 hours ago")
         * @param {Date|string|number} date - Date to format
         * @returns {string} Relative time string
         */
        formatRelativeTime(date) {
            const now = new Date();
            const past = new Date(date);
            const diffMs = now - past;
            const diffSec = Math.floor(diffMs / 1000);
            const diffMin = Math.floor(diffSec / 60);
            const diffHour = Math.floor(diffMin / 60);
            const diffDay = Math.floor(diffHour / 24);
            const diffWeek = Math.floor(diffDay / 7);
            const diffMonth = Math.floor(diffDay / 30);
            const diffYear = Math.floor(diffDay / 365);

            if (diffSec < 60) return 'just now';
            if (diffMin < 60) return `${diffMin} minute${diffMin > 1 ? 's' : ''} ago`;
            if (diffHour < 24) return `${diffHour} hour${diffHour > 1 ? 's' : ''} ago`;
            if (diffDay < 7) return `${diffDay} day${diffDay > 1 ? 's' : ''} ago`;
            if (diffWeek < 4) return `${diffWeek} week${diffWeek > 1 ? 's' : ''} ago`;
            if (diffMonth < 12) return `${diffMonth} month${diffMonth > 1 ? 's' : ''} ago`;
            return `${diffYear} year${diffYear > 1 ? 's' : ''} ago`;
        },

        /**
         * Format duration from seconds to mm:ss
         * @param {number} seconds - Duration in seconds
         * @returns {string} Formatted duration
         */
        formatDuration(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        },

        /**
         * Parse duration string (mm:ss) to seconds
         * @param {string} duration - Duration string
         * @returns {number} Duration in seconds
         */
        parseDuration(duration) {
            if (!duration) return 0;
            const parts = duration.split(':');
            if (parts.length === 2) {
                return parseInt(parts[0]) * 60 + parseInt(parts[1]);
            }
            return 0;
        },

        /**
         * Debounce a function
         * @param {Function} fn - Function to debounce
         * @param {number} delay - Delay in milliseconds
         * @returns {Function} Debounced function
         */
        debounce(fn, delay = 300) {
            let timeoutId;
            return function(...args) {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => fn.apply(this, args), delay);
            };
        },

        /**
         * Throttle a function
         * @param {Function} fn - Function to throttle
         * @param {number} limit - Limit in milliseconds
         * @returns {Function} Throttled function
         */
        throttle(fn, limit = 100) {
            let inThrottle;
            return function(...args) {
                if (!inThrottle) {
                    fn.apply(this, args);
                    inThrottle = true;
                    setTimeout(() => inThrottle = false, limit);
                }
            };
        },

        /**
         * Sanitize HTML to prevent XSS
         * @param {string} html - HTML string to sanitize
         * @returns {string} Sanitized string
         */
        sanitizeHTML(html) {
            const div = document.createElement('div');
            div.textContent = html;
            return div.innerHTML;
        },

        /**
         * Count words in a text
         * @param {string} text - Text to count words in
         * @returns {number} Word count
         */
        countWords(text) {
            if (!text) return 0;
            return text.trim().split(/\s+/).filter(word => word.length > 0).length;
        },

        /**
         * Count characters in a text
         * @param {string} text - Text to count characters in
         * @returns {number} Character count
         */
        countCharacters(text) {
            if (!text) return 0;
            return text.length;
        },

        /**
         * Estimate reading time in minutes
         * @param {string} text - Text to estimate
         * @param {number} wpm - Words per minute (default: 200)
         * @returns {string} Estimated reading time
         */
        estimateReadingTime(text, wpm = 200) {
            const words = this.countWords(text);
            const minutes = Math.ceil(words / wpm);
            if (minutes < 1) return 'Less than 1 min';
            return `${minutes} min read`;
        },

        /**
         * Truncate text to a maximum length
         * @param {string} text - Text to truncate
         * @param {number} maxLength - Maximum length
         * @returns {string} Truncated text
         */
        truncateText(text, maxLength = 100) {
            if (!text || text.length <= maxLength) return text;
            return text.substring(0, maxLength).trim() + '...';
        },

        /**
         * Format file size
         * @param {number} bytes - File size in bytes
         * @returns {string} Formatted file size
         */
        formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        },

        /**
         * Deep clone an object
         * @param {object} obj - Object to clone
         * @returns {object} Cloned object
         */
        deepClone(obj) {
            return JSON.parse(JSON.stringify(obj));
        },

        /**
         * Check if object is empty
         * @param {object} obj - Object to check
         * @returns {boolean} True if empty
         */
        isEmpty(obj) {
            if (!obj) return true;
            if (Array.isArray(obj)) return obj.length === 0;
            if (typeof obj === 'object') return Object.keys(obj).length === 0;
            return false;
        },

        /**
         * Escape regex special characters
         * @param {string} string - String to escape
         * @returns {string} Escaped string
         */
        escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        },

        /**
         * Highlight search terms in text
         * @param {string} text - Text to highlight in
         * @param {string} term - Search term
         * @returns {string} HTML with highlighted terms
         */
        highlightText(text, term) {
            if (!term) return this.sanitizeHTML(text);
            const escaped = this.escapeRegex(term);
            const regex = new RegExp(`(${escaped})`, 'gi');
            return this.sanitizeHTML(text).replace(regex, '<mark class="bg-yellow-200 dark:bg-yellow-800 px-0.5 rounded">\$1</mark>');
        },

        /**
         * Convert text with section markers to formatted HTML
         * @param {string} lyrics - Lyrics text
         * @returns {string} Formatted HTML
         */
        formatLyrics(lyrics) {
            if (!lyrics) return '';
            
            // Escape HTML
            let formatted = this.sanitizeHTML(lyrics);
            
            // Format section markers
            formatted = formatted.replace(/\[([^\]]+)\]/g, '<div class="text-primary-500 font-semibold mt-4 mb-2">[\$1]</div>');
            
            // Convert line breaks
            formatted = formatted.replace(/\n/g, '<br>');
            
            return formatted;
        },

        /**
         * Generate a slug from text
         * @param {string} text - Text to slugify
         * @returns {string} Slugified text
         */
        slugify(text) {
            return text
                .toLowerCase()
                .trim()
                .replace(/[^\w\s-]/g, '')
                .replace(/[\s_-]+/g, '-')
                .replace(/^-+|-+$/g, '');
        },

        /**
         * Copy text to clipboard
         * @param {string} text - Text to copy
         * @returns {Promise<boolean>} Success status
         */
        async copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (err) {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    return true;
                } catch (e) {
                    return false;
                } finally {
                    document.body.removeChild(textarea);
                }
            }
        },

        /**
         * Download a file
         * @param {string} content - File content
         * @param {string} filename - File name
         * @param {string} mimeType - MIME type
         */
        downloadFile(content, filename, mimeType = 'text/plain') {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        },

        /**
         * Read file as text
         * @param {File} file - File to read
         * @returns {Promise<string>} File content
         */
        readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e);
                reader.readAsText(file);
            });
        },

        /**
         * Read file as data URL
         * @param {File} file - File to read
         * @returns {Promise<string>} Data URL
         */
        readFileAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e);
                reader.readAsDataURL(file);
            });
        },

        /**
         * Compress an image
         * @param {string} dataUrl - Image data URL
         * @param {number} maxWidth - Maximum width
         * @param {number} quality - JPEG quality (0-1)
         * @returns {Promise<string>} Compressed data URL
         */
        compressImage(dataUrl, maxWidth = 300, quality = 0.8) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = dataUrl;
            });
        }
    };

    const Validators = {
        /**
         * Validate song data
         * @param {object} data - Song data to validate
         * @returns {object} Validation result { valid, errors }
         */
        validateSong(data) {
            const errors = [];
            
            if (!data.title || data.title.trim() === '') {
                errors.push('Title is required');
            }
            
            if (!data.lyrics || data.lyrics.trim() === '') {
                errors.push('Lyrics are required');
            }
            
            if (data.year && (data.year < 1900 || data.year > 2100)) {
                errors.push('Year must be between 1900 and 2100');
            }
            
            if (data.bpm && (data.bpm < 20 || data.bpm > 300)) {
                errors.push('BPM must be between 20 and 300');
            }
            
            if (data.duration && !/^\d{1,2}:\d{2}$/.test(data.duration)) {
                errors.push('Duration must be in mm:ss format');
            }
            
            return {
                valid: errors.length === 0,
                errors
            };
        },

        /**
         * Validate album data
         * @param {object} data - Album data to validate
         * @returns {object} Validation result
         */
        validateAlbum(data) {
            const errors = [];
            
            if (!data.title || data.title.trim() === '') {
                errors.push('Title is required');
            }
            
            if (!data.artist || data.artist.trim() === '') {
                errors.push('Artist is required');
            }
            
            return {
                valid: errors.length === 0,
                errors
            };
        },

        /**
         * Validate folder data

        validateFolder(data) {

            if (!data.name || data.name.trim() === '') {

            return {

            };
        },

        /**

        validatePlaylist(data) {

            if (!data.name || data.name.trim() === '') {

        }

    // ============================================
    // DATABASE MODULE (IndexedDB)
    // ============================================
    const Database = {
        db: null,
        DB_NAME: 'LyricVaultDB',
        DB_VERSION: 1,
        STORES: {
            SONGS: 'songs',
            ALBUMS: 'albums',
            ARTISTS: 'artists',
            FOLDERS: 'folders',
            PLAYLISTS: 'playlists',
            SETTINGS: 'settings'
        },

        /**
         * Initialize the database
         * @returns {Promise<IDBDatabase>}
         */
        async init() {
            return new Promise((resolve, reject) => {
                if (this.db) {
                    resolve(this.db);
                    return;
                }

                const request = indexedDB.open(this.DB_NAME, this.DB_VERSION);

                request.onerror = () => {
                    console.error('Failed to open database:', request.error);
                    reject(request.error);
                };

                request.onsuccess = () => {
                    this.db = request.result;
                    console.log('Database initialized successfully');
                    resolve(this.db);
                };

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;

                    // Songs store
                    if (!db.objectStoreNames.contains(this.STORES.SONGS)) {
                        const songsStore = db.createObjectStore(this.STORES.SONGS, { keyPath: 'id' });
                        songsStore.createIndex('title', 'title', { unique: false });
                        songsStore.createIndex('artist', 'artist', { unique: false });
                        songsStore.createIndex('album', 'album', { unique: false });
                        songsStore.createIndex('is_favorite', 'is_favorite', { unique: false });
                        songsStore.createIndex('folder_id', 'folder_id', { unique: false });
                        songsStore.createIndex('created_at', 'created_at', { unique: false });
                        songsStore.createIndex('updated_at', 'updated_at', { unique: false });
                    }

                    // Albums store
                    if (!db.objectStoreNames.contains(this.STORES.ALBUMS)) {
                        const albumsStore = db.createObjectStore(this.STORES.ALBUMS, { keyPath: 'id' });
                        albumsStore.createIndex('title', 'title', { unique: false });
                        albumsStore.createIndex('artist', 'artist', { unique: false });
                    }

                    // Artists store
                    if (!db.objectStoreNames.contains(this.STORES.ARTISTS)) {
                        const artistsStore = db.createObjectStore(this.STORES.ARTISTS, { keyPath: 'id' });
                        artistsStore.createIndex('name', 'name', { unique: false });
                    }

                    // Folders store
                    if (!db.objectStoreNames.contains(this.STORES.FOLDERS)) {
                        const foldersStore = db.createObjectStore(this.STORES.FOLDERS, { keyPath: 'id' });
                        foldersStore.createIndex('name', 'name', { unique: false });
                        foldersStore.createIndex('parent_id', 'parent_id', { unique: false });
                    }

                    // Playlists store
                    if (!db.objectStoreNames.contains(this.STORES.PLAYLISTS)) {
                        const playlistsStore = db.createObjectStore(this.STORES.PLAYLISTS, { keyPath: 'id' });
                        playlistsStore.createIndex('name', 'name', { unique: false });
                    }

                    // Settings store
                    if (!db.objectStoreNames.contains(this.STORES.SETTINGS)) {
                        db.createObjectStore(this.STORES.SETTINGS, { keyPath: 'key' });
                    }

                    console.log('Database schema created/updated');
                };
            });
        },

        /**
         * Get a single item by ID
         * @param {string} storeName - Store name
         * @param {string} id - Item ID
         * @returns {Promise<object|null>}
         */
        async get(storeName, id) {
            await this.init();
            return new Promise((resolve, reject) => {
                const transaction = this.db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.get(id);

                request.onsuccess = () => resolve(request.result || null);
                request.onerror = () => reject(request.error);
            });
        },

        /**
         * Get all items from a store
         * @param {string} storeName - Store name
         * @returns {Promise<array>}
         */
        async getAll(storeName) {
            await this.init();
            return new Promise((resolve, reject) => {
                const transaction = this.db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.getAll();

                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => reject(request.error);
            });
        },

        /**
         * Get items by index
         * @param {string} storeName - Store name
         * @param {string} indexName - Index name
         * @param {any} value - Value to search for
         * @returns {Promise<array>}
         */
        async getByIndex(storeName, indexName, value) {
            await this.init();
            return new Promise((resolve, reject) => {
                const transaction = this.db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const index = store.index(indexName);
                const request = index.getAll(value);

                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => reject(request.error);
            });
        },

        /**
         * Add or update an item
         * @param {string} storeName - Store name
         * @param {object} data - Item data
         * @returns {Promise<object>}
         */
        async put(storeName, data) {
            await this.init();
            return new Promise((resolve, reject) => {
                const transaction = this.db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.put(data);

                request.onsuccess = () => resolve(data);
                request.onerror = () => reject(request.error);
            });
        },

        /**
         * Delete an item
         * @param {string} storeName - Store name
         * @param {string} id - Item ID
         * @returns {Promise<void>}
         */
        async delete(storeName, id) {
            await this.init();
            return new Promise((resolve, reject) => {
                const transaction = this.db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.delete(id);

                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        },

        /**
         * Clear all items from a store
         * @param {string} storeName - Store name
         * @returns {Promise<void>}
         */
        async clear(storeName) {
            await this.init();
            return new Promise((resolve, reject) => {
                const transaction = this.db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.clear();

                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        },

        /**
         * Clear all data from all stores
         * @returns {Promise<void>}
         */
        async clearAll() {
            const stores = Object.values(this.STORES);
            for (const store of stores) {
                await this.clear(store);
            }
        },

        /**
         * Get the count of items in a store
         * @param {string} storeName - Store name
         * @returns {Promise<number>}
         */
        async count(storeName) {
            await this.init();
            return new Promise((resolve, reject) => {
                const transaction = this.db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.count();

                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        },

        /**
         * Search items in a store
         * @param {string} storeName - Store name
         * @param {function} predicate - Filter function
         * @returns {Promise<array>}
         */
        async search(storeName, predicate) {
            const items = await this.getAll(storeName);
            return items.filter(predicate);
        },

        /**
         * Create a full backup of all data
         * @returns {Promise<object>}
         */
        async backup() {
            const backup = {
                version: this.DB_VERSION,
                timestamp: new Date().toISOString(),
                data: {}
            };

            for (const [key, storeName] of Object.entries(this.STORES)) {
                backup.data[storeName] = await this.getAll(storeName);
            }

            return backup;
        },

        /**
         * Restore from a backup
         * @param {object} backup - Backup data
         * @returns {Promise<void>}
         */
        async restore(backup) {
            if (!backup || !backup.data) {
                throw new Error('Invalid backup data');
            }

            // Clear existing data
            await this.clearAll();

            // Restore each store
            for (const [storeName, items] of Object.entries(backup.data)) {
                if (Array.isArray(items)) {
                    for (const item of items) {
                        await this.put(storeName, item);
                    }
                }
            }
        },

        /**
         * Get storage usage estimate
         * @returns {Promise<object>}
         */
        async getStorageUsage() {
            if ('storage' in navigator && 'estimate' in navigator.storage) {
                const estimate = await navigator.storage.estimate();
                return {
                    usage: estimate.usage || 0,
                    quota: estimate.quota || 0,
                    percentage: estimate.quota ? Math.round((estimate.usage / estimate.quota) * 100) : 0
                };
            }
            return { usage: 0, quota: 0, percentage: 0 };
        }
    };

    // ============================================
    // STORE MODULE (State Management)
    // ============================================
    const Store = {
        state: {
            songs: [],
            albums: [],
            artists: [],
            folders: [],
            playlists: [],
            settings: {},
            currentSong: null,
            searchQuery: '',
            searchResults: [],
            filters: {
                genre: '',
                artist: '',
                sort: 'updated_desc'
            },
            viewMode: 'grid',
            sidebarCollapsed: false,
            isLoading: false
        },

        listeners: new Map(),

        /**
         * Get state value
         * @param {string} key - State key (supports dot notation)
         * @returns {any}
         */
        get(key) {
            return key.split('.').reduce((obj, k) => obj?.[k], this.state);
        },

        /**
         * Set state value
         * @param {string} key - State key
         * @param {any} value - New value
         */
        set(key, value) {
            const keys = key.split('.');
            const lastKey = keys.pop();
            const target = keys.reduce((obj, k) => obj[k], this.state);
            target[lastKey] = value;
            this.notify(key, value);
        },

        /**
         * Subscribe to state changes
         * @param {string} key - State key to watch
         * @param {function} callback - Callback function
         * @returns {function} Unsubscribe function
         */
        subscribe(key, callback) {
            if (!this.listeners.has(key)) {
                this.listeners.set(key, new Set());
            }
            this.listeners.get(key).add(callback);

            // Return unsubscribe function
            return () => {
                this.listeners.get(key).delete(callback);
            };
        },

        /**
         * Notify listeners of state change
         * @param {string} key - State key that changed
         * @param {any} value - New value
         */
        notify(key, value) {
            // Notify exact key listeners
            if (this.listeners.has(key)) {
                this.listeners.get(key).forEach(cb => cb(value));
            }

            // Notify wildcard listeners
            if (this.listeners.has('*')) {
                this.listeners.get('*').forEach(cb => cb(key, value));
            }
        },

        /**
         * Initialize store with data from database
         */
        async init() {
            try {
                this.set('isLoading', true);

                // Load all data from database
                const [songs, albums, folders, playlists] = await Promise.all([
                    Database.getAll(Database.STORES.SONGS),
                    Database.getAll(Database.STORES.ALBUMS),
                    Database.getAll(Database.STORES.FOLDERS),
                    Database.getAll(Database.STORES.PLAYLISTS)
                ]);

                // Extract unique artists from songs
                const artistsMap = new Map();
                songs.forEach(song => {
                    if (song.artist) {
                        const artistId = Utils.slugify(song.artist);
                        if (!artistsMap.has(artistId)) {
                            artistsMap.set(artistId, {
                                id: artistId,
                                name: song.artist,
                                song_ids: []
                            });
                        }
                        artistsMap.get(artistId).song_ids.push(song.id);
                    }
                });

                // Load settings
                const settings = await this.loadSettings();

                // Update state
                this.state.songs = songs;
                this.state.albums = albums;
                this.state.artists = Array.from(artistsMap.values());
                this.state.folders = folders;
                this.state.playlists = playlists;
                this.state.settings = settings;

                this.set('isLoading', false);
                console.log('Store initialized with data');
            } catch (error) {
                console.error('Failed to initialize store:', error);
                this.set('isLoading', false);
            }
        },

        /**
         * Load settings from database
         * @returns {Promise<object>}
         */
        async loadSettings() {
            const defaults = {
                theme: 'system',
                fontSize: 'medium',
                lineSpacing: 'normal',
                autoSave: true,
                spellCheck: true,
                showWordCount: true,
                exportFormat: 'pdf',
                exportMetadata: true,
                autoBackup: true,
                highContrast: false,
                reduceMotion: false,
                lastBackup: null,
                searchHistory: [],
                recentSongs: []
            };

            try {
                const stored = await Database.get(Database.STORES.SETTINGS, 'preferences');
                return { ...defaults, ...stored?.value };
            } catch {
                return defaults;
            }
        },

        /**
         * Save settings to database
         */
        async saveSettings() {
            await Database.put(Database.STORES.SETTINGS, {
                key: 'preferences',
                value: this.state.settings
            });
        },

        /**
         * Update a setting
         * @param {string} key - Setting key
         * @param {any} value - Setting value
         */
        async updateSetting(key, value) {
            this.state.settings[key] = value;
            await this.saveSettings();
            this.notify('settings', this.state.settings);
        },

        /**
         * Get statistics
         * @returns {object}
         */
        getStats() {
            return {
                totalSongs: this.state.songs.length,
                totalArtists: this.state.artists.length,
                totalAlbums: this.state.albums.length,
                totalFavorites: this.state.songs.filter(s => s.is_favorite).length,
                totalFolders: this.state.folders.length            };
        },

        /**
         * Add to recent songs
         * @param {string} songId - Song ID
         */
        async addToRecent(songId) {
            let recent = this.state.settings.recentSongs || [];
            recent = recent.filter(id => id !== songId);
            recent.unshift(songId);
            recent = recent.slice(0, 20); // Keep only last 20
            await this.updateSetting('recentSongs', recent);
        },

        /**
         * Get recent songs
         * @param {number} limit - Number of songs to return
         * @returns {array}
         */
        getRecentSongs(limit = 8) {
            const recentIds = this.state.settings.recentSongs || [];
            return recentIds
                .slice(0, limit)

                .filter(Boolean);

        /**
         * Add to search history
         * @param {string} query - Search query
         */
        async addToSearchHistory(query) {
            if (!query.trim()) return;
            let history = this.state.settings.searchHistory || [];
            history = history.filter(q => q.toLowerCase() !== query.toLowerCase());
            history.unshift(query);
            history = history.slice(0, 10); // Keep only last 10
            await this.updateSetting('searchHistory', history);

        async clearSearchHistory() {

    // ============================================
    // ROUTER MODULE
    // ============================================
    const Router = {
        routes: {},
        currentRoute: null,
        params: {},
        beforeHooks: [],
        afterHooks: [],

        /**
         * Register a route
         * @param {string} path - Route path (supports :params)
         * @param {function} handler - Route handler function
         */
        register(path, handler) {
            this.routes[path] = handler;
        },

        /**
         * Add a before navigation hook
         * @param {function} hook - Hook function
         */
        beforeEach(hook) {
            this.beforeHooks.push(hook);
        },

        /**
         * Add an after navigation hook
         * @param {function} hook - Hook function
         */
        afterEach(hook) {
            this.afterHooks.push(hook);
        },

        /**
         * Parse route path and extract params
         * @param {string} routePath - Registered route path
         * @param {string} actualPath - Actual URL path
         * @returns {object|null} Params object or null if no match
         */
        matchRoute(routePath, actualPath) {
            const routeParts = routePath.split('/');
            const actualParts = actualPath.split('/');

            if (routeParts.length !== actualParts.length) {
                return null;
            }

            const params = {};

            for (let i = 0; i < routeParts.length; i++) {
                if (routeParts[i].startsWith(':')) {
                    // This is a parameter
                    const paramName = routeParts[i].substring(1);
                    params[paramName] = decodeURIComponent(actualParts[i]);
                } else if (routeParts[i] !== actualParts[i]) {
                    // Static part doesn't match
                    return null;
                }
            }

            return params;
        },

        /**
         * Navigate to a path
         * @param {string} path - Path to navigate to
         * @param {boolean} replace - Replace current history entry
         */
        async navigate(path, replace = false) {
            // Run before hooks
            for (const hook of this.beforeHooks) {
                const result = await hook(path, this.currentRoute);
                if (result === false) {
                    return; // Navigation cancelled
                }
            }

            // Update hash
            if (replace) {
                window.location.replace('#' + path);
            } else {
                window.location.hash = path;
            }
        },

        /**
         * Handle route change
         */
        async handleRouteChange() {
            const hash = window.location.hash.slice(1) || '/';
            const [path, queryString] = hash.split('?');
            
            // Parse query params
            const queryParams = {};
            if (queryString) {
                queryString.split('&').forEach(param => {
                    const [key, value] = param.split('=');
                    queryParams[decodeURIComponent(key)] = decodeURIComponent(value || '');
                });
            }

            // Find matching route
            let matchedRoute = null;
            let matchedParams = {};

            for (const routePath of Object.keys(this.routes)) {
                const params = this.matchRoute(routePath, path);
                if (params !== null) {
                    matchedRoute = routePath;
                    matchedParams = params;
                    break;
                }
            }

            // Store params
            this.params = { ...matchedParams, ...queryParams };
            const previousRoute = this.currentRoute;
            this.currentRoute = path;

            // Call route handler or 404
            if (matchedRoute && this.routes[matchedRoute]) {
                await this.routes[matchedRoute](this.params);
            } else {
                await this.handle404();
            }

            // Run after hooks
            for (const hook of this.afterHooks) {
                await hook(path, previousRoute);
            }

            // Update active navigation links
            this.updateActiveLinks(path);
        },

        /**
         * Handle 404 not found
         */
        async handle404() {
            const template = document.getElementById('template-404');
            const container = document.getElementById('page-container');
            if (template && container) {
                container.innerHTML = template.innerHTML;
            }
        },

        /**
         * Update active state on navigation links
         * @param {string} currentPath - Current path
         */
        updateActiveLinks(currentPath) {
            // Remove all active states
            document.querySelectorAll('.nav-link, .bottom-nav-link').forEach(link => {
                link.classList.remove('bg-primary-100', 'dark:bg-primary-900/30', 'text-primary-600', 'dark:text-primary-400');
            });

            // Determine which page we're on
            let pageName = 'home';
            if (currentPath === '/') {
                pageName = 'home';
            } else {
                const parts = currentPath.split('/').filter(Boolean);
                if (parts.length > 0) {
                    pageName = parts[0];
                    // Handle special cases
                    if (pageName === 'song') {
                        pageName = 'library';
                    }
                }
            }

            // Add active state to matching links
            document.querySelectorAll(`[data-page="${pageName}"]`).forEach(link => {
                link.classList.add('bg-primary-100', 'dark:bg-primary-900/30', 'text-primary-600', 'dark:text-primary-400');
            });
        },

        /**
         * Get current route params
         * @returns {object}
         */
        getParams() {
            return this.params;
        },

        /**
         * Get a specific param
         * @param {string} name - Param name
         * @returns {string|undefined}
         */
        getParam(name) {
            return this.params[name];
        },

        /**
         * Go back in history
         */
        back() {
            window.history.back();
        },

        /**
         * Go forward in history
         */
        forward() {
            window.history.forward();
        },

        /**
         * Initialize router
         */
        init() {
            // Listen for hash changes
            window.addEventListener('hashchange', () => this.handleRouteChange());
            
            // Handle initial route
            this.handleRouteChange();
        }
    };

    // ============================================
    // THEME MODULE
    // ============================================
    const Theme = {
        THEMES: {
            LIGHT: 'light',
            DARK: 'dark',
            SYSTEM: 'system'
        },

        currentTheme: 'system',
        mediaQuery: null,

        /**
         * Initialize theme
         */
        init() {
            // Set up system theme media query listener
            this.mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            this.mediaQuery.addEventListener('change', (e) => {
                if (this.currentTheme === this.THEMES.SYSTEM) {
                    this.applyTheme(e.matches ? 'dark' : 'light');
                }
            });

            // Load saved theme or use system preference
            const savedTheme = localStorage.getItem('theme') || this.THEMES.SYSTEM;
            this.setTheme(savedTheme);
        },

        /**
         * Get system preference
         * @returns {string} 'dark' or 'light'
         */
        getSystemPreference() {
            return this.mediaQuery?.matches ? 'dark' : 'light';
        },

        /**
         * Set theme
         * @param {string} theme - Theme name
         */
        setTheme(theme) {
            this.currentTheme = theme;
            localStorage.setItem('theme', theme);

            if (theme === this.THEMES.SYSTEM) {
                this.applyTheme(this.getSystemPreference());
            } else {
                this.applyTheme(theme);
            }

            // Update settings dropdown if it exists
            const themeSelect = document.getElementById('setting-theme');
            if (themeSelect) {
                themeSelect.value = theme;
            }
        },

        /**
         * Apply theme to document
         * @param {string} theme - 'dark' or 'light'
         */
        applyTheme(theme) {
            const html = document.documentElement;
            
            if (theme === 'dark') {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }

            // Update meta theme-color
            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) {
                metaTheme.setAttribute('content', theme === 'dark' ? '#1F2937' : '#6366F1');
            }
        },

        /**
         * Toggle between light and dark
         */
        toggle() {
            const current = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            this.setTheme(next);
        },

        /**
         * Get current applied theme
         * @returns {string} 'dark' or 'light'
         */
        getCurrentApplied() {
            return document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        },

        /**
         * Get current theme setting
         * @returns {string} Theme setting
         */
        getCurrent() {
            return this.currentTheme;
        }
    };

        /**
         * Show a modal
         * @param {string} templateId - Template ID
         * @param {object} options - Modal options
         * @returns {HTMLElement} Modal element
         */
        showModal(templateId, options = {}) {
            const template = document.getElementById(templateId);
            const container = document.getElementById('modals-container');
            
            if (!template || !container) return null;

            const modal = document.createElement('div');
            modal.innerHTML = template.innerHTML;
            const wrapper = modal.firstElementChild;
            
            container.appendChild(wrapper);

            // Setup close handlers
            wrapper.querySelectorAll('[data-close-modal]').forEach(el => {
                el.addEventListener('click', () => this.hideModal(wrapper));
            });

            // ESC key to close
            const escHandler = (e) => {
                if (e.key === 'Escape') {
                    this.hideModal(wrapper);
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);

            // Focus trap
            const focusableElements = wrapper.querySelectorAll(
                'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
            );
            if (focusableElements.length > 0) {
                focusableElements[0].focus();
            }

            return wrapper;
        },

        /**
         * Hide a modal
         * @param {HTMLElement} modal - Modal element to hide
         */
        hideModal(modal) {
            if (modal) {
                modal.classList.add('animate-fade-out');
                setTimeout(() => modal.remove(), 200);
            }
        },

        /**
         * Hide all modals
         */
        hideAllModals() {
            const container = document.getElementById('modals-container');
            if (container) {
                container.innerHTML = '';
            }
        },

        /**
         * Show confirm dialog
         * @param {string} title - Dialog title
         * @param {string} message - Dialog message
         * @param {object} options - Options { confirmText, cancelText, type }
         * @returns {Promise<boolean>}
         */
        async showConfirm(title, message, options = {}) {
            return new Promise((resolve) => {
                const modal = this.showModal('template-modal-confirm');
                if (!modal) {
                    resolve(false);
                    return;
                }

                // Set content
                const titleEl = modal.querySelector('#modal-confirm-title');
                const messageEl = modal.querySelector('#modal-confirm-message');
                const confirmBtn = modal.querySelector('#modal-confirm-btn');

                if (titleEl) titleEl.textContent = title;
                if (messageEl) messageEl.textContent = message;
                if (confirmBtn && options.confirmText) {
                    confirmBtn.textContent = options.confirmText;
                }

                // Handle confirm
                confirmBtn?.addEventListener('click', () => {
                    this.hideModal(modal);
                    resolve(true);
                });

                // Handle cancel (backdrop or cancel button)
                modal.querySelectorAll('[data-close-modal]').forEach(el => {
                    el.addEventListener('click', () => resolve(false));
                });
            });
        },

        renderSkeletons(count = 4, type = 'card') {
            const skeletons = [];

                    skeletons.push(`

                }
            }
            
            return skeletons.join('');
        }
    };

/**
 * Initialize Folder Detail Page
 */
async initFolderDetailPage(params) {
    const folderId = params.id;
    const folder = await Database.get(Database.STORES.FOLDERS, folderId);

    if (!folder) {
        UI.showToast('Folder not found', 'error');
        Router.navigate('/folders');
        return;
    }

    // Get songs in this folder
    const allSongs = Store.state.songs;
    const songs = allSongs.filter(s => s.folder_id === folderId);

    // Update UI
    document.getElementById('folder-name').textContent = folder.name;
    document.getElementById('folder-song-count').textContent = `${songs.length} song${songs.length !== 1 ? 's' : ''}`;

    // Update folder icon color
    const iconEl = document.getElementById('folder-icon');
    if (iconEl && folder.color) {
        iconEl.style.backgroundColor = `${folder.color}20`;
        const svg = iconEl.querySelector('svg');
        if (svg) svg.style.color = folder.color;
    }

    const songsGrid = document.getElementById('folder-songs-grid');
    const emptyEl = document.getElementById('folder-empty');

    if (songs.length > 0) {
        songsGrid.innerHTML = songs.map(song => UI.renderSongCard(song)).join('');
        songsGrid.classList.remove('hidden');
        emptyEl.classList.add('hidden');
        this.setupFavoriteButtons();
    } else {
        songsGrid.classList.add('hidden');
        emptyEl.classList.remove('hidden');
    }

    // Back button
    document.getElementById('folder-back-btn')?.addEventListener('click', () => {
        Router.navigate('/folders');
    });

    // Delete button
    document.getElementById('folder-delete-btn')?.addEventListener('click', async () => {
        const confirmed = await UI.showConfirm(
            'Delete Folder',
            `Are you sure you want to delete "${folder.name}"? Songs will not be deleted.`
        );

        if (confirmed) {
            // Remove folder_id from songs
            for (const song of songs) {
                song.folder_id = null;
                await Database.put(Database.STORES.SONGS, song);
            }

            // Delete folder
            await Database.delete(Database.STORES.FOLDERS, folderId);
            Store.state.folders = Store.state.folders.filter(f => f.id !== folderId);

            UI.showToast('Folder deleted', 'success');
            Router.navigate('/folders');
        }
    });
},

/**
 * Initialize Presentation Page
 */
async initPresentationPage(params) {
    const songId = params.id;
    const song = await Database.get(Database.STORES.SONGS, songId);

    if (!song) {
        UI.showToast('Song not found', 'error');
        Router.navigate('/library');
        return;
    }

    // Parse lyrics into lines
    const lines = (song.lyrics || '').split('\n').filter(line => line.trim());
    let currentLine = 0;
    let isPlaying = false;
    let autoScrollInterval = null;
    let speed = 5;

    // Update header
    document.getElementById('presentation-title').textContent = song.title;
    document.getElementById('presentation-artist').textContent = song.artist || 'Unknown Artist';

    // Update display function
    const updateDisplay = () => {
        const prevEl = document.getElementById('presentation-prev-line');
        const currentEl = document.getElementById('presentation-current-line');
        const nextEl = document.getElementById('presentation-next-line');
        const progressEl = document.getElementById('presentation-progress');

        if (prevEl) prevEl.textContent = lines[currentLine - 1] || '';
        if (currentEl) currentEl.textContent = lines[currentLine] || '';
        if (nextEl) nextEl.textContent = lines[currentLine + 1] || '';
        if (progressEl) progressEl.textContent = `${currentLine + 1} / ${lines.length}`;
    };

    // Navigation functions
    const nextLine = () => {
        if (currentLine < lines.length - 1) {
            currentLine++;
            updateDisplay();
        } else if (isPlaying) {
            stopAutoScroll();
        }
    };

    const prevLine = () => {
        if (currentLine > 0) {
            currentLine--;
            updateDisplay();
        }
    };

    // Auto-scroll functions
    const startAutoScroll = () => {
        if (autoScrollInterval) return;
        isPlaying = true;
        const interval = Math.max(500, 3000 - (speed * 250));
        autoScrollInterval = setInterval(nextLine, interval);
        
        // Update play button icon to pause
        document.getElementById('presentation-play-icon').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    };

    const stopAutoScroll = () => {
        isPlaying = false;
        if (autoScrollInterval) {
            clearInterval(autoScrollInterval);
            autoScrollInterval = null;
        }
        
        // Update play button icon to play
        document.getElementById('presentation-play-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
    };

    const toggleAutoScroll = () => {
        if (isPlaying) {
            stopAutoScroll();
        } else {
            startAutoScroll();
        }
    };

    // Initial display
    updateDisplay();

    // Event listeners
    document.getElementById('presentation-exit')?.addEventListener('click', () => {
        stopAutoScroll();
        Router.navigate(`/song/${songId}`);
    });

    document.getElementById('presentation-prev')?.addEventListener('click', prevLine);
    document.getElementById('presentation-next')?.addEventListener('click', nextLine);
    document.getElementById('presentation-play')?.addEventListener('click', toggleAutoScroll);

    // Speed control
    const speedSlider = document.getElementById('presentation-speed');
    const speedValue = document.getElementById('presentation-speed-value');
    
    speedSlider?.addEventListener('input', (e) => {
        speed = parseInt(e.target.value);
        if (speedValue) speedValue.textContent = speed;
        
        // Restart auto-scroll with new speed if playing
        if (isPlaying) {
            stopAutoScroll();
            startAutoScroll();
        }
    });

    // Keyboard controls
    const handleKeydown = (e) => {
        if (e.key === 'Escape') {
            stopAutoScroll();
            Router.navigate(`/song/${songId}`);
        } else if (e.key === 'ArrowRight' || e.key === ' ') {
            e.preventDefault();
            nextLine();
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevLine();
        } else if (e.key === 'Enter') {
            e.preventDefault();
            toggleAutoScroll();
        }
    };

    document.addEventListener('keydown', handleKeydown);

    // Cleanup on route change
    Router.beforeEach((to, from) => {
        if (from?.includes('/present/')) {
            stopAutoScroll();
            document.removeEventListener('keydown', handleKeydown);
        }
        return true;
    });
},

/**
 * Initialize Playlist Detail Page
 */
async initPlaylistDetailPage(params) {
    const playlistId = params.id;
    const playlist = await Database.get(Database.STORES.PLAYLISTS, playlistId);

    if (!playlist) {
        UI.showToast('Playlist not found', 'error');
        Router.navigate('/playlists');
        return;
    }

    // Get songs
    const songIds = playlist.song_ids || [];
    const songs = [];
    for (const songId of songIds) {
        const song = Store.state.songs.find(s => s.id === songId);
        if (song) songs.push(song);
    }

    document.getElementById('playlist-name').textContent = playlist.name;
    
    const descEl = document.getElementById('playlist-description');
    if (descEl) {
        descEl.textContent = playlist.description || '';
        if (!playlist.description) descEl.classList.add('hidden');
    }
    
    document.getElementById('playlist-song-count').textContent = `${songs.length} song${songs.length !== 1 ? 's' : ''}`;

    const songsListEl = document.getElementById('playlist-songs-list');
    const emptyEl = document.getElementById('playlist-songs-empty');

    if (songs.length > 0) {
        songsListEl.innerHTML = songs.map((song, index) => `
            <div class="flex items-center gap-4 p-4 hover:bg-dark-50 dark:hover:bg-dark-750 transition-colors" data-song-id="${song.id}">
                <span class="w-6 text-center text-dark-400 text-sm">${index + 1}</span>

                             <svg class="w-5 h-5 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/>
                             </svg>
                           </div>`
                    }
                </div>
                <a href="#/song/${song.id}" class="flex-1 min-w-0">
                    <p class="font-medium text-dark-900 dark:text-white truncate">${Utils.sanitizeHTML(song.title)}</p>
                    <p class="text-sm text-dark-500 truncate">${Utils.sanitizeHTML(song.artist || 'Unknown Artist')}</p>
                </a>
                <button class="remove-song-btn p-2 hover:bg-red-100 dark:hover:bg-red-900/20 rounded text-dark-400 hover:text-red-500 transition-colors" data-song-id="${song.id}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        `).join('');
        
        songsListEl.classList.remove('hidden');
        emptyEl?.classList.add('hidden');

        // Remove song buttons
        songsListEl.querySelectorAll('.remove-song-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const songId = btn.dataset.songId;
                playlist.song_ids = playlist.song_ids.filter(id => id !== songId);
                await Database.put(Database.STORES.PLAYLISTS, playlist);
                
                // Update store
                const storeIndex = Store.state.playlists.findIndex(p => p.id === playlistId);
                if (storeIndex >= 0) {
                    Store.state.playlists[storeIndex] = playlist;
                }
                
                UI.showToast('Song removed from playlist', 'success');
                Router.handleRouteChange(); // Refresh page
            });
        });
    } else {
        songsListEl?.classList.add('hidden');
        emptyEl?.classList.remove('hidden');
    }

    // Back button
    document.getElementById('playlist-back-btn')?.addEventListener('click', () => {
        Router.navigate('/playlists');
    });

    // Delete button
    document.getElementById('playlist-delete-btn')?.addEventListener('click', async () => {
        const confirmed = await UI.showConfirm(
            'Delete Playlist',
            `Are you sure you want to delete "${playlist.name}"?`
        );

        if (confirmed) {
            await Database.delete(Database.STORES.PLAYLISTS, playlistId);
            Store.state.playlists = Store.state.playlists.filter(p => p.id !== playlistId);
            UI.showToast('Playlist deleted', 'success');
            Router.navigate('/playlists');
        }
    });
},
