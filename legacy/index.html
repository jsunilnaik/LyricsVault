        /**
         * Initialize Library Page
         */
        async initLibraryPage() {
            const songs = Store.state.songs;
            let filteredSongs = [...songs];
            let currentView = Store.state.viewMode || 'grid';

            // Update count
            const countEl = document.getElementById('library-count');
            
            // Elements
            const gridContainer = document.getElementById('library-grid');
            const listContainer = document.getElementById('library-list');
            const listBody = document.getElementById('library-list-body');
            const emptyState = document.getElementById('library-empty');
            const noResults = document.getElementById('library-no-results');
            const searchInput = document.getElementById('library-search');
            const genreFilter = document.getElementById('filter-genre');
            const artistFilter = document.getElementById('filter-artist');
            const sortFilter = document.getElementById('filter-sort');
            const viewGridBtn = document.getElementById('view-grid');
            const viewListBtn = document.getElementById('view-list');

            // Populate filter dropdowns
            const genres = [...new Set(songs.flatMap(s => s.genre || []))].sort();
            const artists = [...new Set(songs.map(s => s.artist).filter(Boolean))].sort();

            genres.forEach(g => {
                const option = document.createElement('option');
                option.value = g;
                option.textContent = g;
                genreFilter.appendChild(option);
            });

            artists.forEach(a => {
                const option = document.createElement('option');
                option.value = a;
                option.textContent = a;
                artistFilter.appendChild(option);
            });

            // Render function
            const renderSongs = () => {
                countEl.textContent = `${filteredSongs.length} song${filteredSongs.length !== 1 ? 's' : ''}`;

                if (songs.length === 0) {
                    gridContainer.classList.add('hidden');
                    listContainer.classList.add('hidden');
                    noResults.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    return;
                }

                if (filteredSongs.length === 0) {
                    gridContainer.classList.add('hidden');
                    listContainer.classList.add('hidden');
                    emptyState.classList.add('hidden');
                    noResults.classList.remove('hidden');
                    return;
                }

                emptyState.classList.add('hidden');
                noResults.classList.add('hidden');

                if (currentView === 'grid') {
                    gridContainer.innerHTML = filteredSongs.map(song => UI.renderSongCard(song, 'grid')).join('');
                    gridContainer.classList.remove('hidden');
                    listContainer.classList.add('hidden');
                } else {
                    listBody.innerHTML = filteredSongs.map(song => UI.renderSongCard(song, 'list')).join('');
                    listContainer.classList.remove('hidden');
                    gridContainer.classList.add('hidden');
                }

                // Setup buttons
                this.setupFavoriteButtons();
                this.setupDeleteButtons();
            };

            // Filter and sort function
            const applyFilters = () => {
                const searchTerm = searchInput.value.toLowerCase().trim();
                const selectedGenre = genreFilter.value;
                const selectedArtist = artistFilter.value;
                const sortBy = sortFilter.value;

                filteredSongs = songs.filter(song => {
                    // Search filter
                    if (searchTerm) {
                        const searchIn = [
                            song.title,
                            song.artist,
                            song.album,
                            song.lyrics,
                            ...(song.genre || [])
                        ].filter(Boolean).join(' ').toLowerCase();
                        
                        if (!searchIn.includes(searchTerm)) return false;
                    }

                    // Genre filter
                    if (selectedGenre && !(song.genre || []).includes(selectedGenre)) {
                        return false;
                    }

                    // Artist filter
                    if (selectedArtist && song.artist !== selectedArtist) {
                        return false;
                    }

                    return true;
                });

                // Sort
                filteredSongs.sort((a, b) => {
                    switch (sortBy) {
                        case 'title_asc':
                            return (a.title || '').localeCompare(b.title || '');
                        case 'title_desc':
                            return (b.title || '').localeCompare(a.title || '');
                        case 'artist_asc':
                            return (a.artist || '').localeCompare(b.artist || '');
                        case 'artist_desc':
                            return (b.artist || '').localeCompare(a.artist || '');
                        case 'created_desc':
                            return new Date(b.created_at) - new Date(a.created_at);
                        case 'updated_desc':
                        default:
                            return new Date(b.updated_at) - new Date(a.updated_at);
                    }
                });

                renderSongs();
            };

            // Event listeners
            searchInput.addEventListener('input', Utils.debounce(applyFilters, 300));
            genreFilter.addEventListener('change', applyFilters);
            artistFilter.addEventListener('change', applyFilters);
            sortFilter.addEventListener('change', applyFilters);

            // View toggle
            viewGridBtn.addEventListener('click', () => {
                currentView = 'grid';
                Store.set('viewMode', 'grid');
                viewGridBtn.classList.add('bg-white', 'dark:bg-dark-600', 'shadow-sm');
                viewListBtn.classList.remove('bg-white', 'dark:bg-dark-600', 'shadow-sm');
                renderSongs();
            });

            viewListBtn.addEventListener('click', () => {
                currentView = 'list';
                Store.set('viewMode', 'list');
                viewListBtn.classList.add('bg-white', 'dark:bg-dark-600', 'shadow-sm');
                viewGridBtn.classList.remove('bg-white', 'dark:bg-dark-600', 'shadow-sm');
                renderSongs();
            });

            // Clear filters button
            document.getElementById('clear-filters-btn')?.addEventListener('click', () => {
                searchInput.value = '';
                genreFilter.value = '';
                artistFilter.value = '';
                sortFilter.value = 'updated_desc';
                applyFilters();
            });

            // Set initial view toggle state
            if (currentView === 'list') {
                viewListBtn.classList.add('bg-white', 'dark:bg-dark-600', 'shadow-sm');
                viewGridBtn.classList.remove('bg-white', 'dark:bg-dark-600', 'shadow-sm');
            }

            // Initial render
            applyFilters();
        },

            const saveBtn = document.getElementById('save-song-btn');
            const backBtn = document.getElementById('editor-back-btn');
            const autoSaveIndicator = document.getElementById('auto-save-indicator');

            let artworkDataUrl = null;

            // Populate autocomplete datalists
            const artistsDatalist = document.getElementById('artists-datalist');
            const albumsDatalist = document.getElementById('albums-datalist');
            
            Store.state.artists.forEach(a => {
                const option = document.createElement('option');
                option.value = a.name;
                artistsDatalist.appendChild(option);
            });

            Store.state.albums.forEach(a => {
                const option = document.createElement('option');
                option.value = a.title;
                albumsDatalist.appendChild(option);
            });

            // Populate folders dropdown
            Store.state.folders.forEach(f => {
                const option = document.createElement('option');
                option.value = f.id;
                option.textContent = f.name;
                folderInput.appendChild(option);
            });

            // Fill form if editing
            if (song) {
                titleInput.value = song.title || '';
                artistInput.value = song.artist || '';
                albumInput.value = song.album || '';
                yearInput.value = song.year || '';
                durationInput.value = song.duration || '';
                languageInput.value = song.language || '';
                bpmInput.value = song.bpm || '';
                keyInput.value = song.key || '';
                lyricsInput.value = song.lyrics || '';
                notesInput.value = song.notes || '';
                chordsInput.value = song.chords || '';
                folderInput.value = song.folder_id || '';
                genres = song.genre || [];
                artworkDataUrl = song.artwork_url || null;

                // Set moods
                (song.mood || []).forEach(m => {
                    const checkbox = document.querySelector(`input[name="mood"][value="${m}"]`);
                    if (checkbox) {
                        checkbox.checked = true;
                        checkbox.closest('.mood-checkbox').classList.add('ring-2', 'ring-primary-500');
                    }
                });

                // Show artwork if exists
                if (artworkDataUrl) {
                    artworkPreview.innerHTML = `<img src="${artworkDataUrl}" alt="Artwork" class="w-full h-full object-cover">`;
                    removeArtworkBtn.classList.remove('hidden');
                }
            }

            // Render genre tags
            const renderGenreTags = () => {
                const existingTags = genreTagsContainer.querySelectorAll('.tag');
                existingTags.forEach(t => t.remove());

                genres.forEach(genre => {
                    const tag = document.createElement('span');
                    tag.className = 'tag';
                    tag.innerHTML = `
                        ${Utils.sanitizeHTML(genre)}
                        <button type="button" class="ml-1 hover:text-red-500" data-genre="${Utils.sanitizeHTML(genre)}">×</button>
                    `;
                    genreTagsContainer.insertBefore(tag, genreInput);
                });

                // Remove genre handler
                genreTagsContainer.querySelectorAll('.tag button').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const g = btn.dataset.genre;
                        genres = genres.filter(x => x !== g);
                        renderGenreTags();
                    });
                });
            };

            renderGenreTags();

            // Update word/char count
            const updateCounts = () => {
                const text = lyricsInput.value;
                wordCountEl.textContent = `${Utils.countWords(text)} words`;
                charCountEl.textContent = `${Utils.countCharacters(text)} characters`;
            };

            updateCounts();
            lyricsInput.addEventListener('input', updateCounts);

            // Genre input
            genreInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const value = genreInput.value.trim().replace(',', '');
                    if (value && !genres.includes(value)) {
                        genres.push(value);
                        renderGenreTags();
                    }
                    genreInput.value = '';
                }
            });

            // Genre suggestions
            document.querySelectorAll('.genre-suggestion').forEach(btn => {
                btn.addEventListener('click', () => {
                    const genre = btn.textContent.trim();
                    if (!genres.includes(genre)) {
                        genres.push(genre);
                        renderGenreTags();
                    }
                });
            });

            // Mood checkboxes
            document.querySelectorAll('.mood-checkbox input').forEach(checkbox => {
                checkbox.addEventListener('change', () => {
                    const label = checkbox.closest('.mood-checkbox');
                    if (checkbox.checked) {
                        label.classList.add('ring-2', 'ring-primary-500');
                    } else {
                        label.classList.remove('ring-2', 'ring-primary-500');
                    }
                });
            });

            // Artwork upload
            artworkBtn.addEventListener('click', () => artworkInput.click());
            
            artworkInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (file) {
                    try {
                        const dataUrl = await Utils.readFileAsDataURL(file);
                        artworkDataUrl = await Utils.compressImage(dataUrl, 300, 0.8);
                        artworkPreview.innerHTML = `<img src="${artworkDataUrl}" alt="Artwork" class="w-full h-full object-cover">`;
                        removeArtworkBtn.classList.remove('hidden');
                    } catch (err) {
                        UI.showToast('Failed to load image', 'error');
                    }
                }
            });

            removeArtworkBtn.addEventListener('click', () => {
                artworkDataUrl = null;
                artworkPreview.innerHTML = `
                    <svg class="w-16 h-16 text-dark-300 dark:text-dark-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                `;
                removeArtworkBtn.classList.add('hidden');
            });

            // Lyrics toolbar
            document.querySelectorAll('.lyrics-toolbar-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const action = btn.dataset.action;
                    const markers = {
                        'verse': '[Verse]\n',
                        'chorus': '[Chorus]\n',
                        'bridge': '[Bridge]\n',
                        'pre-chorus': '[Pre-Chorus]\n',
                        'outro': '[Outro]\n',
                        'instrumental': '[Instrumental]\n'
                    };
                    
                    if (markers[action]) {
                        const start = lyricsInput.selectionStart;
                        const end = lyricsInput.selectionEnd;
                        const text = lyricsInput.value;
                        const newLine = start === 0 || text[start - 1] === '\n' ? '' : '\n';
                        lyricsInput.value = text.substring(0, start) + newLine + markers[action] + text.substring(end);
                        lyricsInput.focus();
                        lyricsInput.setSelectionRange(start + newLine.length + markers[action].length, start + newLine.length + markers[action].length);
                        updateCounts();
                    }
                });
            });

            // Auto-save function
            const performAutoSave = async () => {
                if (!Store.state.settings.autoSave) return;
                if (!titleInput.value.trim() || !lyricsInput.value.trim()) return;

                autoSaveIndicator.classList.remove('hidden');
                
                try {
                    await saveSong(true);
                } catch (err) {
                    console.error('Auto-save failed:', err);
                }
                
                setTimeout(() => {
                    autoSaveIndicator.classList.add('hidden');
                }, 1000);
            };

            // Setup auto-save on input
            const triggerAutoSave = Utils.debounce(() => {
                if (!isNew || titleInput.value.trim()) {
                    performAutoSave();
                }
            }, 30000); // 30 seconds

            [titleInput, artistInput, albumInput, lyricsInput, notesInput, chordsInput].forEach(input => {
                input.addEventListener('input', triggerAutoSave);
            });

            // Save function
            const saveSong = async (isAutoSave = false) => {
                // Validate
                const validation = Validators.validateSong({
                    title: titleInput.value,
                    lyrics: lyricsInput.value,
                    year: yearInput.value ? parseInt(yearInput.value) : null,
                    bpm: bpmInput.value ? parseInt(bpmInput.value) : null,
                    duration: durationInput.value
                });

                if (!validation.valid) {
                    if (!isAutoSave) {
                        UI.showToast(validation.errors[0], 'error');
                    }
                    return;
                }

                // Get selected moods
                const selectedMoods = Array.from(document.querySelectorAll('input[name="mood"]:checked'))
                    .map(cb => cb.value);

                // Prepare song data
                const songData = {
                    id: song?.id || Utils.generateUUID(),
                    title: titleInput.value.trim(),
                    artist: artistInput.value.trim() || null,
                    album: albumInput.value.trim() || null,
                    year: yearInput.value ? parseInt(yearInput.value) : null,
                    duration: durationInput.value.trim() || null,
                    language: languageInput.value || null,
                    bpm: bpmInput.value ? parseInt(bpmInput.value) : null,
                    key: keyInput.value || null,
                    lyrics: lyricsInput.value,
                    notes: notesInput.value.trim() || null,
                    chords: chordsInput.value.trim() || null,
                    genre: genres,
                    mood: selectedMoods,
                    folder_id: folderInput.value || null,
                    artwork_url: artworkDataUrl,
                    is_favorite: song?.is_favorite || false,
                    view_count: song?.view_count || 0,
                    created_at: song?.created_at || new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };

                // Save to database
                await Database.put(Database.STORES.SONGS, songData);

                // Update store
                const existingIndex = Store.state.songs.findIndex(s => s.id === songData.id);
                if (existingIndex >= 0) {
                    Store.state.songs[existingIndex] = songData;
                } else {
                    Store.state.songs.push(songData);
                }

                // Update song reference for further edits
                song = songData;

                if (!isAutoSave) {
                    UI.showToast(isNew ? 'Song created!' : 'Song saved!', 'success');
                    Router.navigate(`/song/${songData.id}`);
                }
            };

            // Save button
            saveBtn.addEventListener('click', () => saveSong(false));

            // Back button
            backBtn.addEventListener('click', () => {
                if (song) {
                    Router.navigate(`/song/${song.id}`);
                } else {
                    Router.navigate('/library');
                }
            });

            // Ctrl+S to save
            form.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    saveSong(false);
                }
            });
        },

        /**
         * Initialize Search Page
         */
        async initSearchPage() {
            const searchInput = document.getElementById('search-input');
            const filterBtns = document.querySelectorAll('.search-filter-btn');
            const initialState = document.getElementById('search-initial');
            const resultsContainer = document.getElementById('search-results');
            const resultsGrid = document.getElementById('search-results-grid');
            const resultsCount = document.getElementById('search-results-count');
            const noResults = document.getElementById('search-no-results');
            const recentSection = document.getElementById('recent-searches-section');
            const recentContainer = document.getElementById('recent-searches');
            const noRecentEl = document.getElementById('no-recent-searches');
            const clearHistoryBtn = document.getElementById('clear-search-history');

            let currentFilter = 'all';

            // Render recent searches
            const renderRecentSearches = () => {
                const history = Store.state.settings.searchHistory || [];
                
                if (history.length > 0) {
                    recentContainer.innerHTML = history.map(query => `
                        <button class="recent-search-item px-3 py-1.5 bg-dark-100 dark:bg-dark-700 rounded-full text-sm hover:bg-dark-200 dark:hover:bg-dark-600 transition-colors">
                            ${Utils.sanitizeHTML(query)}
                        </button>
                    `).join('');
                    recentContainer.classList.remove('hidden');
                    noRecentEl.classList.add('hidden');

                    // Click to search
                    recentContainer.querySelectorAll('.recent-search-item').forEach(btn => {
                        btn.addEventListener('click', () => {
                            searchInput.value = btn.textContent.trim();
                            performSearch(btn.textContent.trim());
                        });
                    });
                } else {
                    recentContainer.classList.add('hidden');
                    noRecentEl.classList.remove('hidden');
                }
            };

            renderRecentSearches();

            // Clear history
            clearHistoryBtn?.addEventListener('click', async () => {
                await Store.clearSearchHistory();
                renderRecentSearches();
                UI.showToast('Search history cleared', 'success');
            });

            // Filter buttons
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => {
                        b.classList.remove('bg-primary-500', 'text-white');
                        b.classList.add('bg-dark-100', 'dark:bg-dark-700', 'text-dark-600', 'dark:text-dark-300');
                    });
                    btn.classList.add('bg-primary-500', 'text-white');
                    btn.classList.remove('bg-dark-100', 'dark:bg-dark-700', 'text-dark-600', 'dark:text-dark-300');
                    currentFilter = btn.dataset.filter;
                    
                    if (searchInput.value.trim()) {
                        performSearch(searchInput.value.trim());
                    }
                });
            });

            // Search function
            const performSearch = async (query) => {
                if (!query.trim()) {
                    initialState.classList.remove('hidden');
                    resultsContainer.classList.add('hidden');
                    noResults.classList.add('hidden');
                    recentSection.classList.remove('hidden');
                    return;
                }

                const searchTerm = query.toLowerCase();
                let results = Store.state.songs.filter(song => {
                    switch (currentFilter) {
                        case 'title':
                            return song.title?.toLowerCase().includes(searchTerm);
                        case 'artist':
                            return song.artist?.toLowerCase().includes(searchTerm);
                        case 'album':
                            return song.album?.toLowerCase().includes(searchTerm);
                        case 'lyrics':
                            return song.lyrics?.toLowerCase().includes(searchTerm);
                        case 'all':
                        default:
                            return (
                                song.title?.toLowerCase().includes(searchTerm) ||
                                song.artist?.toLowerCase().includes(searchTerm) ||
                                song.album?.toLowerCase().includes(searchTerm) ||
                                song.lyrics?.toLowerCase().includes(searchTerm) ||
                                (song.genre || []).some(g => g.toLowerCase().includes(searchTerm))
                            );
                    }
                });

                initialState.classList.add('hidden');
                recentSection.classList.add('hidden');

                if (results.length > 0) {
                    resultsCount.textContent = `${results.length} result${results.length !== 1 ? 's' : ''} found`;
                    resultsGrid.innerHTML = results.map(song => UI.renderSongCard(song)).join('');
                    resultsContainer.classList.remove('hidden');
                    noResults.classList.add('hidden');
                    this.setupFavoriteButtons();
                } else {
                    resultsContainer.classList.add('hidden');
                    noResults.classList.remove('hidden');
                }

                // Add to history
                await Store.addToSearchHistory(query);
            };

            // Search input
            searchInput.addEventListener('input', Utils.debounce((e) => {
                performSearch(e.target.value);
            }, 300));

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    performSearch(e.target.value);
                }
            });

            // Focus search input
            searchInput.focus();
        },

        /**
         * Initialize Export Page
         */
        async initExportPage() {
            const songs = Store.state.songs;
            const listContainer = document.getElementById('export-songs-list');
            const emptyEl = document.getElementById('export-songs-empty');
            const selectedCountEl = document.getElementById('selected-count');
            const exportBtn = document.getElementById('export-btn');
            const searchInput = document.getElementById('export-search');
            const selectAllBtn = document.getElementById('select-all-btn');
            const deselectAllBtn = document.getElementById('deselect-all-btn');
            const pdfOptions = document.getElementById('pdf-options');
            const formatInputs = document.querySelectorAll('input[name="export-format"]');

            let selectedSongs = new Set();

            // Render song list
            const renderSongList = (filteredSongs = songs) => {
                if (filteredSongs.length === 0) {
                    listContainer.classList.add('hidden');
                    emptyEl.classList.remove('hidden');
                    return;
                }

                listContainer.classList.remove('hidden');
                emptyEl.classList.add('hidden');

                listContainer.innerHTML = filteredSongs.map(song => `
                    <label class="export-song-item flex items-center gap-3 p-3 rounded-lg hover:bg-dark-50 dark:hover:bg-dark-750 cursor-pointer transition-colors ${selectedSongs.has(song.id) ? 'bg-primary-50 dark:bg-primary-900/20' : ''}" data-song-id="${song.id}">
                        <input type="checkbox" class="w-5 h-5 rounded border-dark-300 text-primary-500 focus:ring-primary-500" ${selectedSongs.has(song.id) ? 'checked' : ''}>
                        <div class="w-10 h-10 rounded overflow-hidden flex-shrink-0">
                            ${song.artwork_url 
                                ? `<img src="${song.artwork_url}" alt="" class="w-full h-full object-cover">`
                                : `<div class="w-full h-full bg-gradient-to-br from-primary-400 to-secondary-500"></div>`
                            }
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-medium text-dark-900 dark:text-white truncate">${Utils.sanitizeHTML(song.title)}</p>
                            <p class="text-sm text-dark-500 truncate">${Utils.sanitizeHTML(song.artist || 'Unknown Artist')}</p>
                        </div>
                    </label>
                `).join('');

                // Checkbox handlers
                listContainer.querySelectorAll('.export-song-item input').forEach(checkbox => {
                    checkbox.addEventListener('change', (e) => {
                        const songId = e.target.closest('.export-song-item').dataset.songId;
                        if (e.target.checked) {
                            selectedSongs.add(songId);
                        } else {
                            selectedSongs.delete(songId);
                        }
                        updateSelection();
                    });
                });
            };

            // Update selection state
            const updateSelection = () => {
                selectedCountEl.textContent = selectedSongs.size;
                exportBtn.disabled = selectedSongs.size === 0;

                // Update visual state
                listContainer.querySelectorAll('.export-song-item').forEach(item => {
                    const songId = item.dataset.songId;
                    if (selectedSongs.has(songId)) {
                        item.classList.add('bg-primary-50', 'dark:bg-primary-900/20');
                    } else {
                        item.classList.remove('bg-primary-50', 'dark:bg-primary-900/20');
                    }
                });
            };

            // Format radio change
            formatInputs.forEach(input => {
                input.addEventListener('change', (e) => {
                    // Update visual selection
                    document.querySelectorAll('.export-format-option').forEach(label => {
                        const radio = label.querySelector('input');
                        if (radio.checked) {
                            label.classList.add('border-primary-500', 'bg-primary-50', 'dark:bg-primary-900/20');
                        } else {
                            label.classList.remove('border-primary-500', 'bg-primary-50', 'dark:bg-primary-900/20');
                        }
                    });

                    // Show/hide PDF options
                    if (e.target.value === 'pdf') {
                        pdfOptions.classList.remove('hidden');
                    } else {
                        pdfOptions.classList.add('hidden');
                    }
                });
            });

            // Initialize format selection visual
            document.querySelectorAll('.export-format-option').forEach(label => {
                const radio = label.querySelector('input');
                if (radio.checked) {
                    label.classList.add('border-primary-500', 'bg-primary-50', 'dark:bg-primary-900/20');
                }
            });

            // Search
            searchInput?.addEventListener('input', Utils.debounce((e) => {
                const term = e.target.value.toLowerCase();
                const filtered = songs.filter(s => 
                    s.title?.toLowerCase().includes(term) ||
                    s.artist?.toLowerCase().includes(term)
                );
                renderSongList(filtered);
            }, 300));

            // Select/Deselect all
            selectAllBtn?.addEventListener('click', () => {
                songs.forEach(s => selectedSongs.add(s.id));
                listContainer.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
                updateSelection();
            });

            deselectAllBtn?.addEventListener('click', () => {
                selectedSongs.clear();
                listContainer.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                updateSelection();
            });

            // Export button
            exportBtn?.addEventListener('click', async () => {
                const format = document.querySelector('input[name="export-format"]:checked')?.value || 'txt';
                const filename = document.getElementById('export-filename')?.value || 'lyrics-export';
                const songsToExport = songs.filter(s => selectedSongs.has(s.id));

                if (songsToExport.length === 0) {
                    UI.showToast('Please select at least one song', 'warning');
                    return;
                }

                UI.showLoading('Exporting...');

                try {
                    switch (format) {
                        case 'txt':
                            this.exportToTxt(songsToExport, filename);
                            break;
                        case 'json':
                            this.exportToJson(songsToExport, filename);
                            break;
                        case 'csv':
                            this.exportToCsv(songsToExport, filename);
                            break;
                        case 'pdf':
                            // PDF export will be implemented in Session 3
                            UI.showToast('PDF export coming soon!', 'info');
                            break;
                    }
                    UI.showToast(`Exported ${songsToExport.length} song(s)`, 'success');
                } catch (error) {
                    console.error('Export failed:', error);
                    UI.showToast('Export failed', 'error');
                } finally {
                    UI.hideLoading();
                }
            });

            // Initial render
            renderSongList();
        },

        /**
         * Show Import Modal
         */
        showImportModal() {
            const modal = UI.showModal('template-modal-import');
            if (!modal) return;

            const dropZone = modal.querySelector('#import-drop-zone');
            const fileInput = modal.querySelector('#import-file-input');
            const preview = modal.querySelector('#import-preview');
            const fileList = modal.querySelector('#import-file-list');
            const importBtn = modal.querySelector('#import-start-btn');
            
            let filesToImport = [];

            // Click to browse
            dropZone?.addEventListener('click', () => fileInput.click());

            // Drag and drop
            dropZone?.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('border-primary-500', 'bg-primary-50', 'dark:bg-primary-900/20');
            });

            dropZone?.addEventListener('dragleave', () => {
                dropZone.classList.remove('border-primary-500', 'bg-primary-50', 'dark:bg-primary-900/20');
            });

            dropZone?.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-primary-500', 'bg-primary-50', 'dark:bg-primary-900/20');
                handleFiles(e.dataTransfer.files);
            });

            // File input change
            fileInput?.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });

            const handleFiles = (files) => {
                filesToImport = Array.from(files);
                
                if (filesToImport.length > 0) {
                    preview.classList.remove('hidden');
                    fileList.innerHTML = filesToImport.map(f => `
                        <div class="flex items-center gap-2 p-2 bg-dark-100 dark:bg-dark-700 rounded">
                            <svg class="w-4 h-4 text-dark-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            <span class="text-sm truncate">${Utils.sanitizeHTML(f.name)}</span>
                            <span class="text-xs text-dark-500 ml-auto">${Utils.formatFileSize(f.size)}</span>
                        </div>
                    `).join('');
                    importBtn.disabled = false;
                }
            };

            // Import button
            importBtn?.addEventListener('click', async () => {
                UI.hideModal(modal);
                UI.showLoading('Importing...');

                try {
                    for (const file of filesToImport) {
                        await this.importFile(file);
                    }
                    await Store.init(); // Refresh store
                    UI.showToast('Import completed', 'success');
                    
                    // Refresh current page
                    Router.handleRouteChange();
                } catch (error) {
                    console.error('Import failed:', error);
                    UI.showToast('Import failed: ' + error.message, 'error');
                } finally {
                    UI.hideLoading();
                }
            });
        },

        /**
         * Import a file
         * @param {File} file - File to import
         */
        async importFile(file) {
            const content = await Utils.readFileAsText(file);
            const ext = file.name.split('.').pop().toLowerCase();

            switch (ext) {
                case 'json':
                    await this.importJson(content);
                    break;
                case 'txt':
                    await this.importTxt(content, file.name);
                    break;
                case 'csv':
                    await this.importCsv(content);
                    break;
                default:
                    throw new Error('Unsupported file format');
            }
        },

        /**
         * Import JSON data
         * @param {string} content - JSON content
         */
        async importJson(content) {
            const data = JSON.parse(content);
            
            // Check if it's a backup file
            if (data.data && data.data.songs) {
                for (const song of data.data.songs) {
                    song.id = Utils.generateUUID(); // Generate new IDs
                    await Database.put(Database.STORES.SONGS, song);
                }
            } 
                        // Check if it's an array of songs
            else if (Array.isArray(data)) {
                for (const song of data) {
                    if (song.title && song.lyrics) {
                        song.id = Utils.generateUUID();
                        song.created_at = song.created_at || new Date().toISOString();
                        song.updated_at = new Date().toISOString();
                        await Database.put(Database.STORES.SONGS, song);
                    }
                }
            }
            // Single song object
            else if (data.title && data.lyrics) {
                data.id = Utils.generateUUID();
                data.created_at = new Date().toISOString();
                data.updated_at = new Date().toISOString();
                await Database.put(Database.STORES.SONGS, data);
            }
        },

        /**
         * Import TXT data
         * @param {string} content - Text content
         * @param {string} filename - Original filename
         */
        async importTxt(content, filename) {
            // Try to parse structured TXT format
            const lines = content.split('\n');
            let title = filename.replace('.txt', '').replace(/_/g, ' ');
            let artist = '';
            let lyrics = content;

            // Check for metadata at the beginning
            for (let i = 0; i < Math.min(5, lines.length); i++) {
                const line = lines[i].trim();
                if (line.toLowerCase().startsWith('title:')) {
                    title = line.substring(6).trim();
                } else if (line.toLowerCase().startsWith('artist:')) {
                    artist = line.substring(7).trim();
                } else if (line.toLowerCase().startsWith('album:')) {
                    // Skip album line
                } else if (line === '---' || line === '===') {
                    lyrics = lines.slice(i + 1).join('\n').trim();
                    break;
                }
            }

            const song = {
                id: Utils.generateUUID(),
                title,
                artist: artist || null,
                lyrics,
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            };

            await Database.put(Database.STORES.SONGS, song);
        },

        /**
         * Import CSV data
         * @param {string} content - CSV content
         */
        async importCsv(content) {
            const lines = content.split('\n');
            if (lines.length < 2) return;

            // Parse header
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g, ''));
            
            // Parse rows
            for (let i = 1; i < lines.length; i++) {
                const values = this.parseCsvLine(lines[i]);
                if (values.length === 0) continue;

                const song = {
                    id: Utils.generateUUID(),
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };

                headers.forEach((header, index) => {
                    if (values[index]) {
                        switch (header) {
                            case 'title':
                                song.title = values[index];
                                break;
                            case 'artist':
                                song.artist = values[index];
                                break;
                            case 'album':
                                song.album = values[index];
                                break;
                            case 'lyrics':
                                song.lyrics = values[index].replace(/\\n/g, '\n');
                                break;
                            case 'genre':
                                song.genre = values[index].split(';').map(g => g.trim());
                                break;
                            case 'year':
                                song.year = parseInt(values[index]) || null;
                                break;
                        }
                    }
                });

                if (song.title && song.lyrics) {
                    await Database.put(Database.STORES.SONGS, song);
                }
            }
        },

        /**
         * Parse a CSV line handling quoted values
         * @param {string} line - CSV line
         * @returns {array} Parsed values
         */
        parseCsvLine(line) {
            const values = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    values.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            
            values.push(current.trim());
            return values;
        },

        /**
         * Export songs to TXT
         * @param {array} songs - Songs to export
         * @param {string} filename - Output filename
         */
        exportToTxt(songs, filename) {
            const includeMetadata = Store.state.settings.exportMetadata !== false;
            
            let content = '';
            
            songs.forEach((song, index) => {
                if (index > 0) {
                    content += '\n\n' + '='.repeat(50) + '\n\n';
                }
                
                if (includeMetadata) {
                    content += `Title: ${song.title}\n`;
                    if (song.artist) content += `Artist: ${song.artist}\n`;
                    if (song.album) content += `Album: ${song.album}\n`;
                    if (song.year) content += `Year: ${song.year}\n`;
                    if (song.genre?.length) content += `Genre: ${song.genre.join(', ')}\n`;
                    content += '\n---\n\n';
                }
                
                content += song.lyrics;
            });

            Utils.downloadFile(content, `${filename}.txt`, 'text/plain');
        },

        /**
         * Export songs to JSON
         * @param {array} songs - Songs to export
         * @param {string} filename - Output filename
         */
        exportToJson(songs, filename) {
            const exportData = songs.map(song => ({
                title: song.title,
                artist: song.artist,
                album: song.album,
                year: song.year,
                genre: song.genre,
                mood: song.mood,
                language: song.language,
                duration: song.duration,
                bpm: song.bpm,
                key: song.key,
                lyrics: song.lyrics,
                notes: song.notes,
                chords: song.chords
            }));

            Utils.downloadFile(
                JSON.stringify(exportData, null, 2),
                `${filename}.json`,
                'application/json'
            );
        },

        /**
         * Export songs to CSV
         * @param {array} songs - Songs to export
         * @param {string} filename - Output filename
         */
        exportToCsv(songs, filename) {
            const headers = ['title', 'artist', 'album', 'year', 'genre', 'lyrics'];
            
            let csv = headers.join(',') + '\n';
            
            songs.forEach(song => {
                const row = [
                    this.escapeCsvValue(song.title || ''),
                    this.escapeCsvValue(song.artist || ''),
                    this.escapeCsvValue(song.album || ''),
                    song.year || '',
                    this.escapeCsvValue((song.genre || []).join(';')),
                    this.escapeCsvValue((song.lyrics || '').replace(/\n/g, '\\n'))
                ];
                csv += row.join(',') + '\n';
            });

            Utils.downloadFile(csv, `${filename}.csv`, 'text/csv');
        },

        /**
         * Escape a value for CSV
         * @param {string} value - Value to escape
         * @returns {string} Escaped value
         */
        escapeCsvValue(value) {
            if (value.includes(',') || value.includes('"') || value.includes('\n')) {
                return '"' + value.replace(/"/g, '""') + '"';
            }
            return value;
        },

        /**

         */
        setupEventListeners() {

            document.getElementById('mobile-menu-toggle')?.addEventListener('click', () => {
                UI.toggleSidebar();

            // Sidebar toggle (desktop)
            document.getElementById('sidebar-toggle')?.addEventListener('click', () => {

            });

            // Sidebar overlay click
            document.getElementById('sidebar-overlay')?.addEventListener('click', () => {
                UI.closeMobileSidebar();
            });

            // Theme toggle
            document.getElementById('theme-toggle')?.addEventListener('click', () => {
                Theme.toggle();
            });

            // Quick add button
            document.getElementById('quick-add-btn')?.addEventListener('click', () => {
                Router.navigate('/song/new');
            });

            // Mobile search toggle
            const mobileSearchToggle = document.getElementById('mobile-search-toggle');
            const mobileSearchBar = document.getElementById('mobile-search-bar');
            
            mobileSearchToggle?.addEventListener('click', () => {
                mobileSearchBar.classList.toggle('hidden');
                if (!mobileSearchBar.classList.contains('hidden')) {
                    document.getElementById('mobile-search-input')?.focus();
                }
            });

            // Header search
            const headerSearch = document.getElementById('header-search');
            headerSearch?.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && headerSearch.value.trim()) {
                    Router.navigate(`/search?q=${encodeURIComponent(headerSearch.value.trim())}`);
                }
            });

            // Mobile search
            const mobileSearchInput = document.getElementById('mobile-search-input');
            mobileSearchInput?.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && mobileSearchInput.value.trim()) {
                    Router.navigate(`/search?q=${encodeURIComponent(mobileSearchInput.value.trim())}`);
                    mobileSearchBar.classList.add('hidden');
                }
            });

            // Import button in sidebar
            document.getElementById('import-btn')?.addEventListener('click', () => {
                this.showImportModal();
            });

            // Handle navigation link clicks to close mobile sidebar
            document.querySelectorAll('.nav-link, .bottom-nav-link').forEach(link => {
                link.addEventListener('click', () => {
                    UI.closeMobileSidebar();
                });
            });

            // Window resize handler
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    // Close mobile sidebar on desktop
                    if (window.innerWidth >= 1024) {
                        UI.closeMobileSidebar();
                    }
                }, 100);
            });

            // Handle beforeunload for unsaved changes
            window.addEventListener('beforeunload', (e) => {
                // Check if there are unsaved changes in editor
                const lyricsInput = document.getElementById('song-lyrics');
                if (lyricsInput && lyricsInput.dataset.modified === 'true') {
                    e.preventDefault();
                    e.returnValue = '';
                }
            });

            // Handle online/offline status
            window.addEventListener('online', () => {
                UI.showToast('You are back online', 'success');
            });

            window.addEventListener('offline', () => {
                UI.showToast('You are offline. Changes will be saved locally.', 'warning');
            });

            // Handle visibility change for auto-save
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {
                    // Trigger any pending auto-saves
                    const autoSaveIndicator = document.getElementById('auto-save-indicator');
                    if (autoSaveIndicator && !autoSaveIndicator.classList.contains('hidden')) {
                        // Auto-save in progress, let it complete
                    }
                }
            });
        },

        /**
         * Setup keyboard shortcuts
         */
        setupKeyboardShortcuts() {
            let gPressed = false;
            let gTimeout = null;

            document.addEventListener('keydown', (e) => {
                // Ignore if typing in input/textarea
                if (e.target.matches('input, textarea, select, [contenteditable="true"]')) {
                    // Only handle Ctrl+S in editor
                    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                        e.preventDefault();
                        document.getElementById('save-song-btn')?.click();
                    }
                    return;
                }

                // Ctrl/Cmd + K - Focus search
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    const searchInput = document.getElementById('header-search') || 
                                       document.getElementById('search-input');
                    searchInput?.focus();
                }

                // Ctrl/Cmd + N - New song
                if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                    e.preventDefault();
                    Router.navigate('/song/new');
                }

                // Ctrl/Cmd + D - Toggle theme
                if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
                    e.preventDefault();
                    Theme.toggle();
                }

                // Ctrl/Cmd + / - Show shortcuts (could open a modal)
                if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                    e.preventDefault();
                    Router.navigate('/settings');
                }

                // Escape - Close modals, deselect
                if (e.key === 'Escape') {
                    UI.hideAllModals();
                    UI.closeMobileSidebar();
                }

                // G + H - Go to Home
                // G + L - Go to Library
                // G + S - Go to Settings
                if (e.key === 'g' && !gPressed) {
                    gPressed = true;
                    gTimeout = setTimeout(() => {
                        gPressed = false;
                    }, 1000);
                } else if (gPressed) {
                    clearTimeout(gTimeout);
                    gPressed = false;

                    switch (e.key) {
                        case 'h':
                            e.preventDefault();
                            Router.navigate('/');
                            break;
                        case 'l':
                            e.preventDefault();
                            Router.navigate('/library');
                            break;
                        case 's':
                            e.preventDefault();
                            Router.navigate('/settings');
                            break;
                        case 'f':
                            e.preventDefault();
                            Router.navigate('/favorites');
                            break;
                    }
                }

                // F - Fullscreen (on song detail page)
                if (e.key === 'f' && !e.ctrlKey && !e.metaKey) {
                    const lyricsContainer = document.getElementById('lyrics-container');
                    if (lyricsContainer && document.fullscreenElement === null) {
                        if (lyricsContainer.requestFullscreen) {
                            lyricsContainer.requestFullscreen();
                        }
                    } else if (document.fullscreenElement) {
                        document.exitFullscreen();
                    }
                }

                // P - Print (on song detail page)
                if (e.key === 'p' && !e.ctrlKey && !e.metaKey) {
                    if (Router.currentRoute?.startsWith('/song/') && !Router.currentRoute?.includes('/edit')) {
                        e.preventDefault();
                        window.print();
                    }
                }

                // E - Edit (on song detail page)
                if (e.key === 'e' && !e.ctrlKey && !e.metaKey) {
                    const editBtn = document.getElementById('detail-edit-btn');
                    if (editBtn) {
                        e.preventDefault();
                        editBtn.click();
                    }
                }

                // + / - - Adjust font size (on song detail page)
                if ((e.key === '+' || e.key === '=') && !e.ctrlKey && !e.metaKey) {
                    document.getElementById('font-increase')?.click();
                }
                if (e.key === '-' && !e.ctrlKey && !e.metaKey) {
                    document.getElementById('font-decrease')?.click();
                }

                // Space - Toggle auto-scroll (on song detail page)
                if (e.key === ' ' && !e.ctrlKey && !e.metaKey) {
                    const autoScrollToggle = document.getElementById('auto-scroll-toggle');
                    if (autoScrollToggle && Router.currentRoute?.startsWith('/song/')) {
                        e.preventDefault();
                        autoScrollToggle.click();
                    }
                }
            });
        }
    };

    // ============================================
    // INITIALIZE APPLICATION
    // ============================================
    
    // Wait for DOM to be ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => App.init());
    } else {
        App.init();
    }

    // Register Service Worker for PWA (will be implemented in Session 3)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('ServiceWorker registered:', registration.scope);
                })
                .catch(error => {
                    console.log('ServiceWorker registration failed:', error);
                });
        });
    }

    // Expose modules globally for debugging (optional, remove in production)
    window.LyricVault = {
        App,
        Router,
        Store,
        Database,
        Theme,
        UI,
        Utils
    };

    </script>
</body>
</html>
